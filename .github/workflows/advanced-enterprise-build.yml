# .github/workflows/advanced-enterprise-build.yml

name: 🏢 Enterprise Advanced Build System

on:
  push:
    branches: [main, develop, staging, release/**]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 0'  # Weekly security scan
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
          - canary

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '18'
  CACHE_VERSION: 1

jobs:
  # ============================================
  # 1. STATIC ANALYSIS & CODE QUALITY
  # ============================================
  
  static-analysis:
    name: 📊 Static Analysis & Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🎯 ESLint Analysis
        run: npm run lint -- --format json --output-file eslint-report.json || true

      - name: 📐 Prettier Check
        run: npm run format:check

      - name: 🔍 Type Check
        run: npm run type-check

      - name: 🐛 SonarCloud Analysis
        uses: SonarSource/sonarcloud-github-action@master
        with:
          args: >
            -Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }}
            -Dsonar.organization=${{ github.repository_owner }}
            -Dsonar.sources=src
            -Dsonar.exclusions=**/*.test.ts,**/*.spec.ts,node_modules/**
            -Dsonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: 📦 Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          path: '.'
          format: 'SARIF'
          args: >
            --enableExperimental
            --enableRetired

      - name: 📤 Upload SARIF
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: dependency-check-report.sarif
          wait-for-processing: true

      - name: 📊 Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const eslint = JSON.parse(fs.readFileSync('eslint-report.json', 'utf8'));
            const errors = eslint.reduce((acc, file) => acc + file.messages.length, 0);
            
            const comment = `## 📊 Code Quality Report
            - **ESLint Errors:** ${errors}
            - **Build Status:** ✅ Passed
            - [View Full Report](https://sonarcloud.io/dashboard?id=${{ github.repository_owner }}_${{ github.event.repository.name }})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ============================================
  # 2. COMPREHENSIVE TESTING SUITE
  # ============================================

  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: npm run test:unit -- --coverage --maxWorkers=2
      - run: npm run test:unit:watch -- --coverage --bail

      - name: 📊 Coverage Report
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-unit

      - name: 💾 Upload Coverage Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: coverage-unit
          path: coverage/

  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: npm run migrate:test
      - run: npm run test:integration -- --coverage

      - uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: integration

  e2e-tests:
    name: 🎯 E2E Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - run: npm run test:e2e

      - name: 📹 Upload E2E Videos
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: e2e-videos
          path: cypress/videos/

  performance-tests:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - run: npm run test:performance

      - name: 📊 Performance Report
        uses: actions/upload-artifact@v3
        with:
          name: performance-report
          path: reports/performance/

  # ============================================
  # 3. SECURITY SCANNING & COMPLIANCE
  # ============================================

  security-scan:
    name: 🔒 Security Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 🔐 Snyk Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: 🛡️ OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          path: '.'
          format: 'SARIF'

      - name: 📤 Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: dependency-check-report.sarif

      - name: 🔍 CodeQL Analysis
        uses: github/codeql-action/init@v2
        with:
          languages: javascript

      - run: npm ci --legacy-peer-deps

      - uses: github/codeql-action/autobuild@v2

      - uses: github/codeql-action/analyze@v2
        with:
          category: '/language:javascript'

  secret-scan:
    name: 🔑 Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🔐 TruffleHog Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ============================================
  # 4. BUILD & CONTAINERIZATION
  # ============================================

  build:
    name: 🏗️ Build Application
    needs: [static-analysis, unit-tests, integration-tests, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v3

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: 🔐 Log in to Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🐳 Build and push
        id: build
        uses: docker/build-push-action@v4
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

  # ============================================
  # 5. IMAGE SCANNING & VERIFICATION
  # ============================================

  image-scan:
    name: 🔍 Container Image Scan
    needs: build
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - name: 🛡️ Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image-tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: trivy-results.sarif

  sbom-generation:
    name: 📋 SBOM Generation
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 📄 Generate SBOM
        run: |
          curl -sSL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft ${{ needs.build.outputs.image-tag }} -o cyclonedx > sbom.xml

      - name: 📤 Upload SBOM
        uses: actions/upload-artifact@v3
        with:
          name: sbom
          path: sbom.xml

  # ============================================
  # 6. DEPLOYMENT STAGES
  # ============================================

  deploy-staging:
    name: 🚀 Deploy to Staging
    needs: [build, image-scan, sbom-generation]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/staging')
    environment:
      name: staging
      url: https://staging.example.com

    steps:
      - uses: actions/checkout@v3

      - name: 🔧 Configure Kubernetes
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: 📦 Deploy with Helm
        run: |
          helm repo add myrepo https://charts.example.com
          helm repo update
          helm upgrade --install staging myrepo/app \
            --namespace staging \
            --values values-staging.yaml \
            --set image.tag=${{ needs.build.outputs.image-tag }}

      - name: ✅ Health Check
        run: |
          for i in {1..30}; do
            if curl -f https://staging.example.com/health; then
              echo "✅ Staging deployment healthy"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
          exit 1

      - name: 🧪 Smoke Tests
        run: |
          npm ci
          npm run test:smoke -- --baseUrl https://staging.example.com

      - name: 📢 Slack Notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Staging deployment successful",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Staging Deployment*\n*Status:* ✅\n*Environment:* staging\n*Image:* ${{ needs.build.outputs.image-tag }}\n<https://staging.example.com|View Application>"
                }
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  canary-deployment:
    name: 🔍 Canary Deployment
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: canary
      url: https://canary.example.com

    steps:
      - uses: actions/checkout@v3

      - name: 🔧 Configure Kubernetes
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > $HOME/.kube/config

      - name: 🎯 Deploy Canary (10% traffic)
        run: |
          helm upgrade --install canary myrepo/app \
            --namespace production \
            --values values-canary.yaml \
            --set image.tag=${{ needs.build.outputs.image-tag }} \
            --set traffic.percentage=10

      - name: 📊 Monitor Canary
        run: |
          echo "Monitoring canary deployment for 10 minutes..."
          sleep 600
          
          # Check error rates
          ERROR_RATE=$(curl -s https://prometheus.example.com/api/v1/query?query='rate(errors_total[5m])' | jq '.data.result[0].value[1]')
          
          if (( $(echo "$ERROR_RATE > 0.01" | bc -l) )); then
            echo "❌ Error rate too high, rolling back"
            exit 1
          fi
          
          echo "✅ Canary monitoring passed"

  deploy-production:
    name: 🌍 Deploy to Production
    needs: [canary-deployment]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://example.com

    steps:
      - uses: actions/checkout@v3

      - name: 🔧 Configure Kubernetes
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > $HOME/.kube/config

      - name: 🌍 Deploy to Production (100% traffic)
        run: |
          helm upgrade --install production myrepo/app \
            --namespace production \
            --values values-prod.yaml \
            --set image.tag=${{ needs.build.outputs.image-tag }} \
            --set traffic.percentage=100 \
            --atomic \
            --timeout 10m

      - name: ✅ Verification
        run: |
          # Health checks
          for i in {1..10}; do
            if curl -f https://example.com/health; then
              echo "✅ Health check passed"
              break
            fi
            sleep 5
          done
          
          # Database connectivity
          kubectl exec -n production deployment/app -- npm run db:health-check

      - name: 📊 Performance Baseline
        run: |
          npm run lighthouse -- --url https://example.com > lighthouse-report.json

      - name: 📢 Announcement
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🚀 Production deployment complete",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Production Deployment Successful* 🎉\n*Environment:* Production\n*Image:* ${{ needs.build.outputs.image-tag }}\n*Deployed by:* ${{ github.actor }}\n<https://example.com|View Application>"
                }
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: 📈 Update Metrics
        run: |
          curl -X POST https://metrics.example.com/api/deployments \
            -H "Authorization: Bearer ${{ secrets.METRICS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "service": "app",
              "version": "${{ needs.build.outputs.image-tag }}",
              "environment": "production",
              "status": "deployed",
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }'

  # ============================================
  # 7. MONITORING & OBSERVABILITY
  # ============================================

  monitoring-setup:
    name: 📊 Monitoring & Observability
    needs: deploy-production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: 📈 Setup Prometheus Alerts
        run: |
          curl -X POST https://prometheus.example.com/api/v1/rules \
            -H "Authorization: Bearer ${{ secrets.PROMETHEUS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @monitoring/alerting-rules.json

      - name: 📊 Setup Grafana Dashboards
        run: |
          curl -X POST https://grafana.example.com/api/dashboards/db \
            -H "Authorization: Bearer ${{ secrets.GRAFANA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @monitoring/dashboards/app-metrics.json

      - name: 🔔 Configure Notifications
        run: |
          echo "Alerting configured for:"
          echo "- High error rate (>1%)"
          echo "- High response time (>500ms)"
          echo "- Low availability (<99.9%)"
          echo "- Database connectivity issues"

  # ============================================
  # 8. POST-DEPLOYMENT VALIDATION
  # ============================================

  post-deployment-validation:
    name: ✅ Post-Deployment Validation
    needs: deploy-production
    runs-on: ubuntu-latest
    if: success()

    steps:
      - uses: actions/checkout@v3

      - name: 🌐 Website Performance
        uses: treosh/lighthouse-ci-action@v9
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: './lighthouserc.json'

      - name: 🔍 API Integration Tests
        run: npm run test:api -- --baseUrl https://example.com

      - name: 📊 Generate Report
        run: |
          npm run generate:deployment-report > deployment-report.html

      - name: 📤 Upload Report
        uses: actions/upload-artifact@v3
        with:
          name: deployment-report
          path: deployment-report.html

  # ============================================
  # 9. NOTIFICATIONS & REPORTING
  # ============================================

  final-notification:
    name: 📢 Final Notification
    needs: [build, deploy-production, post-deployment-validation]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 📧 Email Report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_SERVER }}
          server_port: ${{ secrets.EMAIL_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚀 Deployment Report - ${{ github.ref }}"
          to: ${{ secrets.DEPLOYMENT_EMAIL }}
          from: ci@example.com
          body: |
            Deployment Summary
            ==================
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Status: ${{ needs.build.result }}
            
            Image: ${{ needs.build.outputs.image-tag }}
            
            Jobs Status:
            - Build: ${{ needs.build.result }}
            - Deployment: ${{ needs.deploy-production.result }}
            - Validation: ${{ needs.post-deployment-validation.result }}

      - name: 📊 Generate Summary
        uses: actions/github-script@v6
        with:
          script: |
            const summary = `
            ## 📊 Deployment Summary
            
            | Component | Status |
            |-----------|--------|
            | Build | ${{ needs.build.result }} |
            | Deployment | ${{ needs.deploy-production.result }} |
            | Validation | ${{ needs.post-deployment-validation.result }} |
            
            **Image:** ${{ needs.build.outputs.image-tag }}
            **Commit:** ${{ github.sha }}
            **Author:** ${{ github.actor }}
            `;
            
            core.setOutput('summary', summary);

